name: loan_utilization_app
description: Loan Utilization Tracking App - Flutter + Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase — Storage नाही!
  firebase_core: 3.15.2
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.0

  # State Management
  get: ^4.6.6

  # UI & Animations
  lottie: ^3.0.0
  animate_do: ^3.3.4
  flutter_animate: ^4.5.0

  # Image Picker
  image_picker: ^1.0.7
  image_cropper: 9.1.0

  # Charts
  fl_chart: ^0.67.0

  # Storage for language preference
  get_storage: ^2.1.1

  # OTP Input UI
  pin_code_fields: ^8.0.1

  # Unique ID
  uuid: ^4.3.3

  # Misc
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.4
  percent_indicator: ^4.2.3

  # ✅ Cloudinary साठी
  http: ^1.2.0
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/